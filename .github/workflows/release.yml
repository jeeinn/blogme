name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Prepare distributable
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PACKAGE_NAME="blogme-${TAG}"
          DIST_ROOT="${RUNNER_TEMP}/${PACKAGE_NAME}"

          mkdir -p "${DIST_ROOT}"

          for path in app bootstrap public resources storage vendor scripts .htaccess cli.php composer.json composer.lock package.json package-lock.json LICENSE README.md DEPLOYMENT.md; do
            if [ -e "${path}" ]; then
              cp -a "${path}" "${DIST_ROOT}/"
            fi
          done

          # ── Trim release size ──
          # Remove .gz (zip itself compresses raw JS equally well; keep .br for superior ratio)
          find "${DIST_ROOT}/public" -name '*.gz' -delete
          # Remove TTF font fallbacks (all modern browsers support woff2)
          find "${DIST_ROOT}/public" -name '*.ttf' -delete
          # Remove JS source files (development only)
          find "${DIST_ROOT}/public" -name '*-src.js' -delete
          # Remove user uploads (not part of distribution)
          rm -rf "${DIST_ROOT}/public/uploads/images/"*/ "${DIST_ROOT}/public/uploads/covers/"*.{jpg,jpeg,png,webp} 2>/dev/null || true
          # Remove node_modules if accidentally copied
          rm -rf "${DIST_ROOT}/node_modules" 2>/dev/null || true

          cd "${RUNNER_TEMP}"
          zip -r "${GITHUB_WORKSPACE}/${PACKAGE_NAME}.zip" "${PACKAGE_NAME}"

      - name: Create checksum
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PACKAGE_NAME="blogme-${TAG}.zip"
          sha256sum "${PACKAGE_NAME}" > "${PACKAGE_NAME}.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ github.ref_name }}
          files: |
            blogme-${{ github.ref_name }}.zip
            blogme-${{ github.ref_name }}.zip.sha256
          overwrite_files: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
