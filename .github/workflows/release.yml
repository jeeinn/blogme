name: Build And Release

on:
  push:
    tags:
      - "v*"
      - "release-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare distributable
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PACKAGE_NAME="blogme-${TAG}"
          DIST_ROOT="${RUNNER_TEMP}/${PACKAGE_NAME}"

          mkdir -p "${DIST_ROOT}"

          for path in app bootstrap config data public resources storage vendor cli.php composer.json composer.lock LICENSE README.md; do
            if [ -e "${path}" ]; then
              cp -a "${path}" "${DIST_ROOT}/"
            fi
          done

          cd "${RUNNER_TEMP}"
          zip -r "${GITHUB_WORKSPACE}/${PACKAGE_NAME}.zip" "${PACKAGE_NAME}"

      - name: Create checksum
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PACKAGE_NAME="blogme-${TAG}.zip"
          sha256sum "${PACKAGE_NAME}" > "${PACKAGE_NAME}.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            blogme-${{ github.ref_name }}.zip
            blogme-${{ github.ref_name }}.zip.sha256
          overwrite_files: true
          generate_release_notes: true
