<!DOCTYPE html>
<html class="is-secondary">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <link rel="stylesheet" href="{=$ctx->URL->RelativeRoot}admin/assets/tocas.min.css" />
        <script src="{=$ctx->URL->RelativeRoot}admin/assets/tocas.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <link rel="icon" type="image/png" href="{=$ctx->URL->RelativeRoot}assets/favicon.png">
        <title>{=$ctx->Name}</title>
        <style>
            body {
                font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Noto Sans JP", "Noto Sans KR", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            }
            /** temporary fix for #14, on hold for Tocas 5.0.2 */
            @-moz-document url-prefix() {
                body:has(> .ts-app-center, > form > .ts-app-center) {
                    height: 100%;
                }
            }
        </style>
    </head>
    <body>
        <form method="POST">
            <input type="hidden" name="_csrf" value="{=$ctx->CSRF}" />
            <div class="ts-app-center">
                <div class="content">
                    <div class="ts-header is-large is-heavy is-icon">
                        <div class="ts-icon is-fish-icon"></div>
                        <a class="ts-text is-undecorated" href="{=$ctx->URL->RelativeRoot}">{=$ctx->Name}</a>
                    </div>
                    <div class="has-top-spaced-large" style="width: 280px">
                        {if $ctx->Message}
                        <div class="ts-notice is-negative has-bottom-spaced">
                            <div class="content">{=$ctx->Message}</div>
                        </div>
                        {/if}
                        <div class="ts-box">
                            <div class="ts-content is-padded">
                                <div class="ts-wrap is-vertical">
                                    <div class="ts-text is-label">{=tr('users_email')}</div>
                                    <div class="ts-input is-start-icon">
                                        <span class="ts-icon is-user-icon"></span>
                                        <input type="email" name="email" required />
                                    </div>
                                    <div class="ts-text is-label">{=tr('users_password')}</div>
                                    <div class="ts-input is-start-icon">
                                        <span class="ts-icon is-lock-icon"></span>
                                        <input type="password" name="password" required />
                                    </div>
                                    <div></div>
                                    <div class="ts-grid">
                                        <div class="column">
                                            <a href="{=$ctx->URL->RelativeRoot}" class="ts-button is-ghost">{=tr('button_back')}</a>
                                        </div>
                                        <div class="column is-fluid">
                                            <button type="submit" class="ts-button is-fluid">{=tr('button_login')}</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </body>
</html>
