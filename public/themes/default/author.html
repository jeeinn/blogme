<div id="singular-author" class="has-vertically-padded-large">
    <div class="ts-grid {if bool_not($ctx->Post->Author->Bio)}is-middle-aligned{/if}">
        <div class="column">
            <a href="{=$ctx->URL->RelativeRoot}author/{=$ctx->Post->Author->ID}" class="ts-image is-circular">
                <img src="{=$ctx->Post->Author->Gravatar}" width="60" alt="{=$ctx->Post->Author->Nickname}" />
            </a>
        </div>
        <div class="column is-fluid">
            <a href="{=$ctx->URL->RelativeRoot}author/{=$ctx->Post->Author->ID}" id="author-nickname" class="ts-text is-bold">{=$ctx->Post->Author->Nickname}</a>
            {if $ctx->Post->Author->Bio}
            <div id="author-bio" class="ts-text is-secondary mobile:is-small">{=$ctx->Post->Author->Bio|html}</div>
            {/if}
        </div>
    </div>
</div>
