# 静态资源压缩（放在 server 块；若你统一放到 http 块也可以）
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

# 优先提供构建时生成的 .gz 预压缩文件，避免实时压缩
gzip_static on;

# 若 Nginx 已安装 brotli 模块，可额外启用：
# brotli on;
# brotli_comp_level 5;
# brotli_min_length 1024;
# brotli_static on;
# brotli_types
#     text/plain
#     text/css
#     text/javascript
#     application/javascript
#     application/json
#     application/xml
#     application/rss+xml
#     image/svg+xml;

# 避免 /admin 被当成物理目录 public/admin/ 触发 301 -> /admin/ -> 403
location = /admin/ {
    return 301 /admin;
}

# 浏览器默认请求，避免无意义 404
location = /favicon.ico {
    try_files /themes/default/assets/favicon.png =404;
    access_log off;
}

# 后台静态资源（物理文件在 public/admin/assets）
location ^~ /admin/assets/ {
    try_files $uri =404;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
}

# 上传资源（物理文件在 public/uploads）
location ^~ /uploads/ {
    try_files $uri =404;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

# 主题资源（物理文件在 public/themes）
location ^~ /themes/ {
    try_files $uri =404;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
}

# 兼容旧主题中的 /assets/* 路径，交给应用层按当前主题映射
location ^~ /assets/ {
    try_files $uri /index.php?$query_string;
}

# 其余路由全部交给 index.php
location / {
    try_files $uri /index.php?$query_string;
}
