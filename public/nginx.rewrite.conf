# 避免 /admin 被当成物理目录 public/admin/ 触发 301 -> /admin/ -> 403
location = /admin/ {
    return 301 /admin;
}

# 浏览器默认请求，避免无意义 404
location = /favicon.ico {
    try_files /assets/favicon.png =404;
    access_log off;
}

# 后台静态资源（物理文件在 public/admin/assets）
location ^~ /admin/assets/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
}

# 上传资源（物理文件在 public/uploads）
location ^~ /uploads/ {
    try_files $uri =404;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

# 主题资源（/assets/*）: 文件不存在时回退给 index.php 由应用输出
location ^~ /assets/ {
    try_files $uri /index.php?$query_string;
}

# 其余路由全部交给 index.php
location / {
    try_files $uri /index.php?$query_string;
}